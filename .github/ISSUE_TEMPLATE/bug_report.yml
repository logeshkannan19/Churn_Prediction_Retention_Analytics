name: Bug Report
description: Create a report to help us improve
title: "[BUG] "
labels: ["bug"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## Description
        Please describe the bug concisely.
        
  - type: textarea
    id: steps
    attributes:
      label: "Steps to Reproduce"
      description: "How can we reproduce the issue?"
      placeholder: |
        1. Go to '...'
        2. Run '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "Expected Behavior"
      description: "What did you expect to happen?"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: "Actual Behavior"
      description: "What actually happened?"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: "Python Version"
      description: "Which Python version are you using?"
      placeholder: "e.g., 3.10.0"
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: "Operating System"
      description: "What OS are you running on?"
      placeholder: "e.g., macOS 13.0"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: "Relevant Logs"
      description: "Please include any relevant logs here."
      placeholder: |
        ```
        Paste your logs here
        ```
    validations:
      required: false
